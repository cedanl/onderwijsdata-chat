[project]
name = "onderwijsdata-chat"
version = "0.1.0"
description = "Chat met open Nederlandse onderwijsdata (CBS + RIO)"
requires-python = ">=3.11"
dependencies = [
    "chainlit>=1.0",
    "anthropic>=0.87.0",
    "python-dotenv>=1.0",
    "onderwijsdata @ git+https://github.com/cedanl/cbs-onderwijsdata.git",
    "riodata @ git+https://github.com/cedanl/rio-onderwijsdata.git",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
