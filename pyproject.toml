[project]
name = "onderwijsdata-chat"
version = "0.1.0"
description = "Chat met open Nederlandse onderwijsdata (CBS + RIO)"
requires-python = ">=3.11"
dependencies = [
    "chainlit>=1.0",
    "litellm>=1.40",
    "plotly>=5.0",
    "python-dotenv>=1.0",
    "onderwijsdata @ git+https://github.com/cedanl/cbs-onderwijsdata.git",
    "riodata[analyse] @ git+https://github.com/cedanl/rio-onderwijsdata.git",
    "markdown>=3.10.2",
    "openpyxl>=3.1.5",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.19",
    "asyncpg>=0.28",
    "greenlet>=3.0",
    "kaleido>=1.3.0",
    "fpdf2>=2.8.7",
]

[dependency-groups]
dev = ["watchfiles>=0.21", "pytest>=8.0", "pytest-asyncio>=0.23"]
docs = [
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "pymdown-extensions>=10.0",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv]
package = false
cache-dir = ".uv_cache"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
