# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - onderwijsdata-chat

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Export requirements.txt from uv
        run: uv export --no-dev --no-hashes -o requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Run Python tests
        run: |
          PYTHONPATH=".python_packages/lib/site-packages:$PYTHONPATH" \
          pip install pytest pytest-asyncio && \
          python -m pytest tests/ -x -q --ignore=tests/test_eval_aggregation.py

      - name: Scan Python dependencies for vulnerabilities
        run: pip install pip-audit && pip-audit -r requirements.txt || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scan npm dependencies for vulnerabilities
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Build and test React frontend
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        id: deploy-to-webapp
        with:
          app-name: 'onderwijsdata-chat'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_63DF31C884EF443FBED13EA7A8E366C4 }}
